<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Academy | جاري عرض الشهادة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; color: #333; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #007bff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { font-size: 1.1rem; font-weight: 500; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>جاري معالجة الشهادة وتأمين الرابط...</p>

    <script>
        // الحصول على المعرف من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const rawId = urlParams.get('id');

        if (rawId) {
            // الحالة الأولى: الرابط صريح (أرقام فقط) - نقوم بتشفيره
            if (!rawId.includes("==") && (/[0-9]/.test(rawId))) {
                // تشفير الرقم إلى Base64
                const encoded = btoa(rawId);
                
                // تحديث شكل الرابط في المتصفح ليظهر مشفراً دون إعادة تحميل الصفحة
                const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?id=' + encoded;
                window.history.replaceState({path: newUrl}, '', newUrl);

                // الانتظار للحظة ثم التوجه للملف الحقيقي (مثلاً 000-001.html)
                setTimeout(() => {
                    window.location.href = `/certifications/${rawId}.html`;
                }, 800);
            } 
            // الحالة الثانية: الرابط مشفر بالفعل - نقوم بفك التشفير لفتح الملف
            else {
                try {
                    const decodedId = atob(rawId);
                    window.location.href = `/certifications/${decodedId}.html`;
                } catch (e) {
                    document.body.innerHTML = "<h2 style='color:red;'>خطأ: رابط الشهادة غير صالح أو تالف!</h2>";
                }
            }
        } else {
            document.body.innerHTML = "<h2>تنبيه: لم يتم تحديد شهادة للعرض.</h2>";
        }
    </script>
</body>
</html>
